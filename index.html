<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exact Match</title>

<style>
body {
    background-color: #e5e5e5;
    font-family: "Times New Roman", serif;
}

/* 外框 */
.container {
    width: 620px;
    margin: 60px auto;
    background: #f2f2f2;
    padding: 25px 30px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.35);
}

/* Heading 1 */
h1 {
    margin: 0 0 20px 0;
    font-size: 32px;
    font-weight: bold;
    border-bottom: 4px solid black;
    display: inline-block; /* 讓線只跟文字一樣長 */
    padding-bottom: 5px;
}

/* Heading 2 */
h2 {
    margin: 0 0 25px 0;
    font-size: 22px;
    font-style: italic;
    border: 3px solid #c6d300;
    padding: 5px 10px;
}

/* Heading 3 */
h3 {
    margin: 0;
    font-size: 20px;
    text-align: right;
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="container">

    <h1>This is heading 1</h1>

    <h2>This is heading 2</h2>

    <h3>This is heading 3</h3>

</div>

</body>
</html>

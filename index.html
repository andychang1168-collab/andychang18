<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exact Match</title>

<style>
body {
    background-color: #e5e5e5;
    font-family: "Times New Roman", serif;
}

.container {
    width: 900px; /* 比之前更寬 */
    margin: 60px auto;
    background: #f2f2f2;
    padding: 30px 40px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.35);
}

/* h1 */
h1 {
    margin: 0 0 25px 0;
    font-size: 42px;
    border-top: 8px solid black; /* 粗線！ */
    display: inline-block;
    padding-bottom: 8px; /* 拉開距離 */
}

/* h2 */
h2 {
    margin: 0 0 40px 0;
    font-size: 28px;
    font-style: italic;
    border: 4px solid #c6d300;
    padding: 10px;
    width: 100%; /* 撐滿整行 */
    box-sizing: border-box;
}

/* h3 */
h3 {
    margin: 0;
    font-size: 26px;
    text-align: right;
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="container">

    <h1>This is heading 1</h1>

    <h2>This is heading 2</h2>

    <h3>This is heading 3</h3>

</div>

</body>
</html>
